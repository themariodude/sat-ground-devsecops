name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # 4. Run unit tests
      - name: Run tests with pytest
        run: pytest tests/ -v --tb=short

      # 5. Lint with ruff
      - name: Lint with ruff
        run: ruff check app/ tests/

      # 6. Static security scan with Bandit
      - name: Security scan (Bandit)
        run: bandit -r app/ -f json -o bandit-report.json || true

      - name: Display Bandit results
        run: cat bandit-report.json
        if: always()

      # 7. Dependency vulnerability scan
      - name: Dependency scan (pip-audit)
        run: pip-audit --format json --output pip-audit-report.json || true

      - name: Display pip-audit results
        run: cat pip-audit-report.json
        if: always()

  docker-build-scan:
    runs-on: ubuntu-latest
    needs: test-and-scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 8. Build Docker image
      - name: Build Docker image
        run: docker build -t sat-ground-tracker:${{ github.sha }} .

      # 9. Container vulnerability scan with Trivy
      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sat-ground-tracker:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

      # 10. Verify container starts
      - name: Smoke test container
        run: |
          docker run -d --name test-container -p 8000:8000 sat-ground-tracker:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop test-container
