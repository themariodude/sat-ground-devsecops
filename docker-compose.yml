version: "3.9"

services:
  satellite-tracker:
    build: .
    container_name: sat-ground-tracker
    ports:
      - "8000:8000"
    environment:
      - APP_VERSION=1.0.0
      - TLE_REFRESH_SECONDS=3600
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); exit(0 if r.status_code == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
