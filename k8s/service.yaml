apiVersion: v1
kind: Service
metadata:
  name: sat-ground-tracker-svc
spec:
  selector:
    app: sat-ground-tracker
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sat-tracker-config
data:
  APP_VERSION: "1.0.0"
  TLE_REFRESH_SECONDS: "3600"
  TLE_FALLBACK_PATH: "data/fallback_tle.txt"
